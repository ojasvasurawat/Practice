<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Notes</title>
    <link href="style.css" rel="stylesheet" />
</head>
<body>
    <h1 id="heading">Daily Notes</h1>
    <div id="alert_box"></div>
    <h3 id="sub-heading">You'r notes</h3>

    <div id="main_section">

    
        <div id="note_section">

        
            <div id="note_box">
                <div id="notes">

                </div>
            </div>
            <div id="input_div">
                <input type="text" placeholder="Enter your note" id="note">
                <button onclick="addNote()" id="add_button">Add note</button>
            </div>

        </div>
        
        <div id="calendar_section">



        </div>

    </div>



    <script>

        const now = Date();

        let id = -1;

        window.onload = function(){
            let i = 1;
            // const data = localStorage.getItem(i);
            while(localStorage.getItem(i) !== null){
                const data = localStorage.getItem(i).split(",")
                console.log(data);


                const parent = document.getElementById("notes");
                const child = document.createElement("div");
                // child.innerText = "hello there";
                child.id = `note${id}`;
                child.className = "all_note"
                child.innerHTML = `<div class="note_data">
                                        <p class="note_text">${data[0]}</p>
                                        <div class="date_time">
                                            <p>created at: ${data[1].slice(0,15)}</p>
                                            <p>time: ${data[1].slice(16,21)}</p>
                                        </div>
                                    </div>
                                    <button onclick="deleteNote(${id})" class="delet_button">delete note</button>`;
                parent.appendChild(child);
                


                i++;
            }
            id = i;



            // ===== CALENDAR CODE =====

            const nowFull = new Date();
    const calendar = document.getElementById("calendar_section");

    const currentYear = nowFull.getFullYear();
    const currentMonth = nowFull.getMonth();

    const months = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    // Year display
    const year = document.createElement("div");
    year.id = "year_section";
    year.innerText = currentYear;

    // Month display
    const month = document.createElement("div");
    month.id = "month_section";
    month.innerText = months[currentMonth];

    // Days header
    const daysContainer = document.createElement("div");
    daysContainer.className = "days_header";

    const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    days.forEach(day => {
        const d = document.createElement("div");
        d.innerText = day;
        daysContainer.appendChild(d);
    });

    // Dates grid
    const datesContainer = document.createElement("div");
    datesContainer.className = "dates_grid";

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

    // Empty spaces before first day
    for (let j = 0; j < firstDay; j++) {
        const empty = document.createElement("div");
        datesContainer.appendChild(empty);
    }

    // Actual dates
    for (let d = 1; d <= totalDays; d++) {
        const dateBox = document.createElement("div");
        dateBox.className = "date_box";
        dateBox.innerText = d;

        // Highlight today
        if (
            d === nowFull.getDate() &&
            currentMonth === nowFull.getMonth() &&
            currentYear === nowFull.getFullYear()
        ) {
            dateBox.classList.add("today");
        }

        datesContainer.appendChild(dateBox);
    }

    // Append everything
    calendar.appendChild(year);
    calendar.appendChild(month);
    calendar.appendChild(daysContainer);
    calendar.appendChild(datesContainer);

        }
        

        document.getElementById("note").addEventListener("keydown", function(event){
            if(event.key === "Enter"){
                event.preventDefault;

                addNote();
            }
        })

        
        async function addNote(){
            const text_input = document.getElementById("note");
            text = text_input.value;
            text = text.trim();
            console.log(text);
            console.log(text.length);
            if(text.length > 200){
                const alert_box = document.getElementById("alert_box");
                Object.assign(alert_box.style, {
                    border: '2px solid rgb(0, 175, 175)',
                    height: '4vh',
                    width: '25vw',
                    borderRadius: '8px',
                    color: 'red',    
                    fontSize: '0.9rem',
                    
                });
                alert_box.innerText = "to long text";
                console.log("before");
                await new Promise(resolve => setTimeout(resolve, 3000));
                console.log("after");
                alert_box.innerText = "";
                Object.assign(alert_box.style, {
                    border: '',
                    height: '',
                    width: '',
                    borderRadius: '',
                    color: '',
                    fontSize: ''
                });
            }
            else if(text === ""){
                const alert_box = document.getElementById("alert_box");
                Object.assign(alert_box.style, {
                    border: '2px solid rgb(0, 175, 175)',
                    height: '4vh',
                    width: '25vw',
                    borderRadius: '8px',
                    color: 'red',    
                    fontSize: '0.9rem',
                    
                });
                alert_box.innerText = "enter something";
                console.log("before");
                await new Promise(resolve => setTimeout(resolve, 3000));
                console.log("after");
                alert_box.innerText = "";
                Object.assign(alert_box.style, {
                    border: '',
                    height: '',
                    width: '',
                    borderRadius: '',
                    color: '',
                    fontSize: ''
                });
            }
            else{
                const parent = document.getElementById("notes");
                const child = document.createElement("div");
                // child.innerText = "hello there";
                child.id = `note${id}`;
                child.className = "all_note"
                child.innerHTML = `<div class="note_data">
                                        <p class="note_text">${text}</p>
                                        <div class="date_time">
                                            <p>created at: ${now.slice(0,15)}</p>
                                            <p>time: ${now.slice(16,21)}</p>
                                        </div>
                                    </div>
                                    <button onclick="deleteNote(${id})" class="delet_button">delete note</button>`;
                parent.appendChild(child);
                localStorage.setItem(id, [text, now]);
                console.log(child.id);
                console.log(now);
                console.log(now.slice(0,15));
                
                id++;
                text_input.value="";
            }
        }

        function deleteNote(id){
            const parent = document.getElementById("notes");
            const child = document.getElementById(`note${id}`);
            parent.removeChild(child);

            let i = 1;
            // const data = localStorage.getItem(i);
            while(localStorage.getItem(i) !== null){
                const data = localStorage.getItem(i).split(",")
                console.log(data);
                if(i === id){
                    localStorage.removeItem(id);
                    // break;
                }
                if(i>id){
                    localStorage.setItem(i-1, localStorage.getItem(i))
                }
                i++;
            }
            localStorage.removeItem(i-1);
        }
    </script>
</body>
</html>
